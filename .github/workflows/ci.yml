name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test-javascript:
    name: JavaScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Test
        id: npm-ci-test
        run: npm run ci-test

  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up test git history
        run: |
          git config user.email "ci@github.com"
          git config user.name "CI Test"

          # v10.9.0 — older release, commits here must NOT appear in the changelog
          git tag 10.9.0
          git commit --allow-empty -m "feat(erp): add purchase order workflow [#HIVE-010]"
          git commit --allow-empty -m "fix(shop): fix display bug on mobile [#HIVE-011]"
          git commit --allow-empty -m "chore(core): upgrade node version [#HIVE-012]"

          # v11.0.0 — the release the action will use as previous-version
          git tag 11.0.0

          # Simulate a newer tag that exists on another branch (e.g. main is at 12.0.0).
          # We create it on a descendant commit, then reset back.
          # The action must ignore it because --merged HEAD only returns ancestors.
          git commit --allow-empty -m "chore: future commit on main [#MAIN-001]"
          git tag 12.0.0
          git reset --hard HEAD~1

          git commit --allow-empty -m "feat(shop): add machine status dashboard [#HIVE-063]"
          git commit --allow-empty -m "fix(erp): resolve inventory sync on partial picks [#HIVE-300]"
          git commit --allow-empty -m "fix(shop): correct task assignment on shift change [#HIVE-301, #SUPP-012]"
          git commit --allow-empty -m "feat(api)!: remove deprecated v1 endpoints [#HIVE-200]"
          git commit --allow-empty -m "docs(api): update endpoint documentation [#HIVE-099]"
          git commit --allow-empty -m "feat(inv): add bulk import from CSV [#HIVE-089] [skip ci]"
          git commit --allow-empty -m "fix(inv): fix reservation calculation error [#HIVE-090]"
          git commit --allow-empty -m "perf(inv): optimise stock query for large warehouses [#HIVE-091]"
          git commit --allow-empty \
            -m "feat(qc): add quality control metrics dashboard [#HIVE-150]" \
            -m "Introduces a new real-time dashboard for QC operators. Includes trend charts, SPC limits, and defect categorisation. The body of this commit should not appear in the changelog — only the subject line is used."
          git commit --allow-empty -m "fix(common): fix typo in shared utility --no-issue"
          git commit --allow-empty -m "fix: apply global security patch [#HIVE-999]"
          git commit --allow-empty -m "feat(legacy): migrate old data format [#HIVE-500]"
          git commit --allow-empty -m "chore(core): bump dependencies [#HIVE-001]"

      - name: Run Release Action (dry-run)
        id: release
        uses: ./
        with:
          release_scope: patch
          tracker-url: https://stemys.atlassian.net/browse
          github-token: ${{ secrets.GITHUB_TOKEN }}
          header-markdown-file: .github/release-header.md
          dry-run: true

      - name: Assert outputs
        env:
          CHANGELOG_DIFF: ${{ steps.release.outputs.changelog-diff }}
        run: |
          echo "previous-version : ${{ steps.release.outputs.previous-version }}"
          echo "new-version      : ${{ steps.release.outputs.new-version }}"
          echo ""
          echo "changelog-diff:"
          echo "$CHANGELOG_DIFF"
          echo ""

          # Write to file for artifact upload
          echo "$CHANGELOG_DIFF" > changelog-diff-preview.md

          fail() { echo "FAIL: $1"; exit 1; }
          ok()   { echo "OK  : $1"; }
          assert_contains() {
            if echo "$CHANGELOG_DIFF" | grep -qF "$1"; then
              ok "$2"
            else
              fail "$3"
            fi
          }

          if [ "${{ steps.release.outputs.previous-version }}" = "11.0.0" ]; then
            ok "previous-version is 11.0.0"
          else
            fail "expected previous-version=11.0.0, got ${{ steps.release.outputs.previous-version }}"
          fi

          if [ "${{ steps.release.outputs.new-version }}" = "11.0.1" ]; then
            ok "new-version is 11.0.1"
          else
            fail "expected new-version=11.0.1, got ${{ steps.release.outputs.new-version }}"
          fi

          # commit hash links are absolute
          assert_contains "https://github.com/stemys/release-action/commit/" \
            "commit links are absolute" \
            "commit links must be absolute when commit-url is set"

          # version heading is a link to the release page
          assert_contains "[11.0.1](https://github.com/stemys/release-action/releases/tag/11.0.1)" \
            "version heading links to release page" \
            "missing release URL link in version heading"

          # header-markdown-file content appears before the commit list
          assert_contains "Before deploying" \
            "header file first line present" \
            "missing first line of header-markdown-file"
          assert_contains "Deployment checklist" \
            "header file checklist heading present" \
            "missing checklist heading from header-markdown-file"

          # scopes are grouped with their label
          assert_contains "shop — Shopfloor"  "shop scope present"  "missing 'shop — Shopfloor'"
          assert_contains "api — API"         "api scope present"   "missing 'api — API'"
          assert_contains "erp — ERP"         "erp scope present"   "missing 'erp — ERP'"

          # breaking change section
          assert_contains "Breaking Changes"                "breaking changes section present" "missing '⚠ Breaking Changes'"
          assert_contains "remove deprecated v1 endpoints"  "breaking feat subject present"   "missing breaking feat subject"

          # multi-ticket commit
          assert_contains "HIVE-301"  "ticket HIVE-301 present"  "missing ticket HIVE-301"
          assert_contains "SUPP-012"  "ticket SUPP-012 present"  "missing ticket SUPP-012"

          # tracker URL is rendered as a link
          assert_contains "stemys.atlassian.net/browse/HIVE-063" "tracker link present" "missing tracker URL"

          # no-scope commit goes to General
          assert_contains "### General"                 "General section present"   "missing '### General' section"
          assert_contains "apply global security patch" "no-scope subject present"  "missing no-scope commit subject"

          # unknown scope gets a group but no display name
          assert_contains "### legacy"               "unknown scope group present"   "missing '### legacy' group"
          assert_contains "migrate old data format"  "unknown scope subject present" "missing unknown scope commit subject"

          # multiline commit: only the subject appears, not the body
          assert_contains "quality control metrics dashboard" "multiline commit subject present" "missing multiline commit subject"

          assert_contains "fix typo in shared utility" "--no-issue commit subject present" "missing --no-issue commit subject"

          # commits before 11.0.0 must not appear in the changelog
          if echo "$CHANGELOG_DIFF" | grep -q "purchase order workflow"; then
            fail "commit from before previous-version must not appear in changelog"
          else
            ok "pre-11.0.0 commits are correctly excluded"
          fi

          # chore commits must not appear in the changelog
          if echo "$CHANGELOG_DIFF" | grep -q "bump dependencies"; then
            fail "chore commit must be hidden from changelog"
          else
            ok "chore commit is correctly hidden"
          fi

          echo ""
          echo "All assertions passed."

      - name: Upload changelog diff preview
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: changelog-diff-preview
          path: changelog-diff-preview.md
          retention-days: 7
