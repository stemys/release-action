name: Example Workflow

on:
  workflow_dispatch:
    inputs:
      release_scope:
        description: 'SemVer component to bump: major, minor, or patch'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      release_stage:
        description: 'Pre-release stage'
        required: true
        default: stable
        type: choice
        options:
          - stable
          - rc
          - beta
          - alpha
      dry_run:
        description: 'Preview without pushing or creating a release'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Release Action
        id: release
        # Change @main to a specific commit SHA or version tag, e.g.:
        # stemys/release-action@v1.0.0
        uses: stemys/release-action@main
        with:
          release_scope: ${{ inputs.release_scope }}
          release_stage: ${{ inputs.release_stage }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          dry-run: ${{ inputs.dry_run }}

      - name: Print outputs
        run: |
          echo "Previous version: ${{ steps.release.outputs.previous-version }}"
          echo "New version:      ${{ steps.release.outputs.new-version }}"
